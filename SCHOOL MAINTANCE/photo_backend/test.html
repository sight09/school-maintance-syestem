<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upload Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .preview {
            margin-top: 20px;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .gallery {
            margin-top: 30px;
        }

        .gallery h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .photo-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .photo-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .photo-item p {
            padding: 8px;
            background: #f8f9fa;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📸 Photo Upload Test</h1>

        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="photo">Choose Photo:</label>
                <input type="file" id="photo" name="photo" accept="image/jpeg,image/jpg,image/png,image/webp" required>
            </div>

            <div class="preview" id="preview"></div>

            <button type="submit" id="submitBtn">Upload Photo</button>
        </form>

        <div class="message" id="message"></div>

        <div class="gallery">
            <h2>Recent Uploads</h2>
            <div class="photo-grid" id="photoGrid"></div>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const photoInput = document.getElementById('photo');
        const preview = document.getElementById('preview');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const photoGrid = document.getElementById('photoGrid');

        // Preview image before upload
        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(uploadForm);

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading...';

            try {
                const response = await fetch('http://localhost/photo_backend/upload.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Photo uploaded successfully!', 'success');
                    uploadForm.reset();
                    preview.innerHTML = '';
                    loadPhotos(); // Reload gallery
                } else {
                    showMessage('Error: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error occurred', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Photo';
            }
        });

        // Show message
        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.style.display = 'block';

            setTimeout(() => {
                message.style.display = 'none';
            }, 5000);
        }

        // Load photos
        async function loadPhotos() {
            try {
                const response = await fetch('http://localhost/photo_backend/get_photos.php');
                const data = await response.json();

                if (data.success) {
                    displayPhotos(data.data.photos);
                }
            } catch (error) {
                console.error('Error loading photos:', error);
            }
        }

        // Display photos in gallery
        function displayPhotos(photos) {
            if (photos.length === 0) {
                photoGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No photos yet</p>';
                return;
            }

            photoGrid.innerHTML = photos.slice(0, 6).map(photo => `
                <div class="photo-item">
                    <img src="${photo.photo_url}" alt="${photo.username}">
                    <p>${photo.username}</p>
                </div>
            `).join('');
        }

        // Load photos on page load
        loadPhotos();
    </script>
</body>

</html>
