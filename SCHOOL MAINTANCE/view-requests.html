<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Plain HTML/CSS/JavaScript — No TypeScript, No Frameworks -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Maintenance Requests</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <header>
      <h1>My Requests</h1>
      <p class="subtitle">Track the status of your reported issues</p>

      <nav class="nav-links">
        <a href="index.html">Submit Request</a>
        <a href="view-requests.html" class="active">My Requests</a>
        <a href="admin-dashboard.html">Admin Dashboard</a>
      </nav>
    </header>

    <main class="card">
      <!-- Search Bar -->
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by issue name or location...">
      </div>

      <!-- Table -->
      <div class="table-container" id="requestsTable">
        <table>
          <thead>
            <tr>
              <th style="width: 20%;">Issue Name</th>
              <th style="width: 15%;">Location</th>
              <th style="width: 25%;">Description</th>
              <th style="width: 10%;">Reporter</th>
              <th style="width: 10%;">Status</th>
              <th style="width: 10%;">Date</th>
              <th style="width: 10%;">Photo</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Rows rendered by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
