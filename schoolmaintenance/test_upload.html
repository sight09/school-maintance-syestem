<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Photo Upload - School Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            background: #f8f9fa;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .preview {
            margin-top: 15px;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 10px;
            border: 2px solid #e0e0e0;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .info-box {
            background: #e7f3ff;
            border: 2px solid #b3d9ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-box h3 {
            color: #0056b3;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .info-box ul {
            margin-left: 20px;
            color: #004085;
        }

        .info-box li {
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 Test Photo Upload</h1>
        <p class="subtitle">School Maintenance System</p>

        <div class="info-box">
            <h3>📸 Upload Requirements:</h3>
            <ul>
                <li>File types: JPG, JPEG, PNG</li>
                <li>Maximum size: 3MB</li>
                <li>Image will be validated</li>
            </ul>
        </div>

        <form id="testForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="issue_name">Issue Name: *</label>
                <input type="text" id="issue_name" name="issue_name" placeholder="e.g., Broken Window" required>
            </div>

            <div class="form-group">
                <label for="description">Description: *</label>
                <textarea id="description" name="description" placeholder="Describe the issue..." required></textarea>
            </div>

            <div class="form-group">
                <label for="location">Location: *</label>
                <input type="text" id="location" name="location" placeholder="e.g., Room 101, Building A" required>
            </div>

            <div class="form-group">
                <label for="reporter_name">Reporter Name: *</label>
                <input type="text" id="reporter_name" name="reporter_name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="photo">Upload Photo: (Optional)</label>
                <input type="file" id="photo" name="photo" accept="image/jpeg,image/jpg,image/png">
            </div>

            <div class="preview" id="preview"></div>

            <button type="submit" id="submitBtn">📤 Submit Request</button>
        </form>

        <div class="message" id="message"></div>
    </div>

    <script>
        const testForm = document.getElementById('testForm');
        const photoInput = document.getElementById('photo');
        const preview = document.getElementById('preview');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        // Preview image before upload
        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                // Check file size
                if (file.size > 3145728) {
                    showMessage('File size exceeds 3MB limit!', 'error');
                    photoInput.value = '';
                    preview.innerHTML = '';
                    return;
                }

                // Check file type
                const validTypes = ['image/jpeg', 'image/jpg', 'image/png'];
                if (!validTypes.includes(file.type)) {
                    showMessage('Invalid file type! Only JPG and PNG allowed.', 'error');
                    photoInput.value = '';
                    preview.innerHTML = '';
                    return;
                }

                // Show preview
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `
                        <p style="color: #666; margin-bottom: 5px;">Preview:</p>
                        <img src="${e.target.result}" alt="Preview">
                        <p style="color: #999; margin-top: 5px; font-size: 14px;">
                            ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)
                        </p>
                    `;
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
            }
        });

        // Handle form submission
        testForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(testForm);

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Uploading...';

            try {
                // Update this URL to match your folder name
                const response = await fetch('http://localhost/schoolmaintance/backend/create_request.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ Success! Request submitted with photo uploaded.', 'success');
                    testForm.reset();
                    preview.innerHTML = '';

                    // Show details
                    console.log('Response:', data);
                    setTimeout(() => {
                        showMessage(
                            `✅ Request #${data.data.request_id} created successfully!\n` +
                            `Issue: ${data.data.issue_name}\n` +
                            `Status: ${data.data.status}`,
                            'success'
                        );
                    }, 100);
                } else {
                    showMessage('❌ Error: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Network error: Could not connect to backend. Make sure XAMPP is running!', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Submit Request';
            }
        });

        // Show message
        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            message.style.display = 'block';
            message.style.whiteSpace = 'pre-line';

            setTimeout(() => {
                message.style.display = 'none';
            }, 8000);
        }
    </script>
</body>

</html>
